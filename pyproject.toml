[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "trade"
version = "0.1.0"
description = "Fixture-first Global ETF Momentum backtest MVP."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "yfinance>=0.2.40",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.10",
  "pytest>=8.2",
  "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["trade"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
files = ["trade"]
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
