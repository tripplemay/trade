name: AI Safety Eval

# Forward-compat: GitHub Actions deprecates Node 20 on 2026-09-16.
# Set runtime to Node 24 so JS-based actions (checkout/setup-python/...) run on
# Node 24 immediately and don't switch under us in September.
# Source: framework v0.9.23 #2.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Trigger on any change to the LLM module, the red-team dataset itself, or this
# workflow file. The dataset path is the second leg of permanent boundary (o)
# (PR-review-gated edits) — touching it must re-run the gate so a contributor
# cannot ship a relaxed sample without the 100% block proof.
#
# Permanent boundary (n): this workflow is a deploy gate. workbench-deploy.yml
# must list "AI Safety Eval" alongside the Backend/Frontend CIs so a red run
# blocks production deploy.
on:
  push:
    branches: [main]
    paths:
      - "workbench/backend/workbench_api/llm/**"
      - "workbench/backend/workbench_api/advisor/**"
      - "workbench/backend/tests/safety/test_ai_advisor_red_team.py"
      - "data/safety-evals/**"
      - ".github/workflows/ai-safety-eval.yml"
  pull_request:
    paths:
      - "workbench/backend/workbench_api/llm/**"
      - "workbench/backend/workbench_api/advisor/**"
      - "workbench/backend/tests/safety/test_ai_advisor_red_team.py"
      - "data/safety-evals/**"
      - ".github/workflows/ai-safety-eval.yml"

concurrency:
  group: ai-safety-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  safety-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: workbench/backend
    env:
      # AIGC_GATEWAY_API_KEY is wired here so when B036 swaps the mock advisor
      # for a real LLMGateway call, the workflow already has the secret. B032
      # phase short-circuits on INSUFFICIENT_GROUNDING so the key is not used;
      # we still inject it now to avoid a "works locally / fails in CI" drift
      # the day the advisor lands.
      AIGC_GATEWAY_API_KEY: ${{ secrets.AIGC_GATEWAY_API_KEY }}
      # B036: the real advisor calls gateway.advise → cost_guard (boundary
      # (m)), which reads/writes the llm_budget_log table. Pin a throwaway
      # SQLite DB + run migrations below so that table exists (B032 used a
      # mock advisor that never hit the gateway, so this was not needed).
      WORKBENCH_DB_URL: sqlite:///./safety-eval.db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # B073 F002: full history so the advisor-path-change detector below can
          # diff this commit against its base (github.event.before / PR base sha).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: workbench/backend/pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend with dev tooling
        run: python -m pip install -e ".[dev]"

      - name: Apply migrations (cost-guard llm_budget_log table)
        # The real advisor's cost guard (boundary (m)) reads/writes
        # llm_budget_log; create the schema before the gate runs.
        run: |
          rm -f safety-eval.db
          python -m alembic upgrade head

      - name: Detect AI advisor path changes (B073 F002 §0)
        # Compute whether THIS change touched AI advisor logic (llm/ or
        # advisor/). The live eval below skips a gateway *outage* (503/429/
        # timeout) so an unrelated deploy is not blocked — UNLESS advisor logic
        # changed, in which case an unverified change while the gateway is down
        # still BLOCKS (unreachable != safe pass). Fail-closed: any error
        # computing the diff -> changed=true (block), never silently skip.
        env:
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set +e
          ZERO="0000000000000000000000000000000000000000"
          if [ -n "$BASE_SHA" ]; then
            RANGE="$BASE_SHA...$HEAD_SHA"
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$ZERO" ]; then
            RANGE="$BEFORE_SHA $HEAD_SHA"
          else
            RANGE=""
          fi
          if [ -z "$RANGE" ]; then
            echo "AI_ADVISOR_PATHS_CHANGED=true" >> "$GITHUB_ENV"
            echo "no diff range (first push / unknown) -> fail-closed changed=true"
            exit 0
          fi
          CHANGED=$(git diff --name-only $RANGE)
          if [ $? -ne 0 ]; then
            echo "AI_ADVISOR_PATHS_CHANGED=true" >> "$GITHUB_ENV"
            echo "git diff failed -> fail-closed changed=true"
            exit 0
          fi
          echo "changed files:"; printf '%s\n' "$CHANGED"
          FLAG=$(printf '%s\n' "$CHANGED" | python -c "import sys; from workbench_api.llm.eval_resilience import advisor_paths_changed; print('true' if advisor_paths_changed(sys.stdin.read().splitlines()) else 'false')")
          if [ -z "$FLAG" ]; then FLAG=true; fi
          echo "AI_ADVISOR_PATHS_CHANGED=$FLAG" >> "$GITHUB_ENV"
          echo "AI_ADVISOR_PATHS_CHANGED=$FLAG"

      - name: Run deterministic red-team safety eval (VCR, always-on, no key)
        # B073 F002: the always-on hard gate. Replays committed cassettes so it
        # runs with no gateway key and no network — an external outage can never
        # redden or silence it. Catches OUR safety-code regressions.
        run: python -m pytest tests/safety/test_ai_advisor_red_team_vcr.py -v --block-network

      - name: Run live red-team safety eval (parametrize 15 samples)
        # Best-effort live drift check. A real safety bypass hard-fails; a
        # gateway outage skips-with-warning (unless advisor logic changed).
        run: python -m pytest tests/safety/test_ai_advisor_red_team.py -v

      - name: Verify safety eval workflow wiring
        # Separate test file pins the workflow YAML invariants (paths,
        # env, deploy-gate inclusion). Keeping it here as a second step
        # so a failure tells you exactly which side broke.
        run: python -m pytest tests/safety/test_safety_eval_workflow.py -v
