name: Bootstrap /etc/workbench/workbench.env (manual, one-time)

# This workflow exists to ship the production env file to the VM without
# ever exposing OAuth / NextAuth secrets in chat, in the repo, or in CI logs.
#
# It reads the 4 sensitive values from GitHub Secrets, assembles the env
# file, and SCPs it to the deploy user's home directory at
# /home/deploy/.bootstrap/workbench.env (chmod 600, deploy:deploy).
#
# A separate admin step (run by an account with full sudo, not the deploy
# user) must then move that staged file into /etc/workbench/workbench.env:
#
#   sudo install -m 640 -o root -g deploy \
#     /home/deploy/.bootstrap/workbench.env \
#     /etc/workbench/workbench.env
#   sudo rm /home/deploy/.bootstrap/workbench.env
#
# Why split: the deploy user's sudoers (B021 prep #3) is locked to
# systemctl restart/status of the two workbench services only. We do NOT
# loosen it for one-time bootstrap. The final install step uses the
# tripplezhou (full sudo) account.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'bootstrap-env' to confirm (prevents accidental dispatch)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  bootstrap:
    if: ${{ github.event.inputs.confirm == 'bootstrap-env' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set up SSH key
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build env file content from secrets
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          ALLOWED_USER_EMAIL: ${{ secrets.ALLOWED_USER_EMAIL }}
          # B027 F002 — Tiingo Starter API key for real-market-data ingest.
          # Backend-only secret; surface only here so the env file the
          # deploy workflow reads on the VM carries it. Missing on the VM
          # → deploy.sh pre-flight check exits 66 with remediation message.
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
          # B029 F001 — SEC EDGAR contact email for required User-Agent
          # header (永久边界 (h); SEC bans non-conforming IPs for 30d
          # — https://www.sec.gov/os/accessing-edgar-data). Same shape as
          # TIINGO_API_KEY: surface here so the deploy workflow ships it
          # to /etc/workbench/workbench.env. Missing on the VM →
          # deploy.sh pre-flight check exits 67 with remediation message.
          SEC_EDGAR_CONTACT_EMAIL: ${{ secrets.SEC_EDGAR_CONTACT_EMAIL }}
        run: |
          # set +x to be defensive — GHA masks ${{ secrets.* }} but never echo plaintext anyway.
          set +x
          STAGE_DIR="$RUNNER_TEMP/wbenv"
          mkdir -p "$STAGE_DIR"
          ENVFILE="$STAGE_DIR/workbench.env"
          # Heredoc with `EOF` (unquoted) → shell expands $VAR refs to real values from env.
          cat > "$ENVFILE" <<EOF
          # Workbench production environment file
          # Generated by .github/workflows/bootstrap-env.yml on $(date -Iseconds)
          # chmod 640 root:deploy after install. Never committed.
          GOOGLE_OAUTH_CLIENT_ID=$GOOGLE_OAUTH_CLIENT_ID
          GOOGLE_OAUTH_CLIENT_SECRET=$GOOGLE_OAUTH_CLIENT_SECRET
          NEXTAUTH_SECRET=$NEXTAUTH_SECRET
          NEXTAUTH_URL=https://trade.guangai.ai
          ALLOWED_USER_EMAIL=$ALLOWED_USER_EMAIL
          WORKBENCH_DB_URL=sqlite:////var/lib/workbench/db/workbench.db
          WORKBENCH_LOG_DIR=/var/log/workbench
          WORKBENCH_BACKUP_LOG=/var/log/workbench/backup.log
          # SENTRY_DSN= # optional; leave commented unless Sentry project set up
          # B027 F002 — Tiingo Starter API key (real-market-data ingest).
          TIINGO_API_KEY=$TIINGO_API_KEY
          # B029 F001 — SEC EDGAR contact email for User-Agent header.
          SEC_EDGAR_CONTACT_EMAIL=$SEC_EDGAR_CONTACT_EMAIL
          # B030 F003 — NEXT_PUBLIC_SYNTHETIC_DATA_BANNER is the only
          # B026 banner-related env var. It is NOT a backend secret;
          # it is a frontend build-time public flag and lives in
          # ``workbench/frontend/.env.production`` (auto-loaded by
          # ``next build``). Documented here per the v0.9.30 §12.9
          # four-接线 convention so future maintainers know the
          # banner flag is NOT injected into /etc/workbench/workbench.env.
          # Production value: NEXT_PUBLIC_SYNTHETIC_DATA_BANNER=false
          # (milestone A Layer 0→1 complete; component preserved for
          # future Layer 0 fallback per 永久边界 (k)).
          EOF
          chmod 600 "$ENVFILE"
          # Sanity: confirm the file isn't empty and doesn't contain literal PLACEHOLDER
          # text — fail loud if a referenced secret somehow returned empty.
          if grep -q 'PLACEHOLDER-REPLACE-ME' "$ENVFILE"; then
            echo "::error::Refusing to ship: env file still contains PLACEHOLDER-REPLACE-ME after secret substitution. One of the GitHub Secrets values is itself a placeholder." >&2
            exit 1
          fi
          # Each required key must be present and non-empty
          for k in GOOGLE_OAUTH_CLIENT_ID GOOGLE_OAUTH_CLIENT_SECRET NEXTAUTH_SECRET ALLOWED_USER_EMAIL TIINGO_API_KEY SEC_EDGAR_CONTACT_EMAIL; do
            if ! grep -qE "^${k}=." "$ENVFILE"; then
              echo "::error::Refusing to ship: ${k} is missing or empty in the assembled env file." >&2
              exit 1
            fi
          done
          # Stash path for next step (do not print contents)
          echo "ENVFILE=$ENVFILE" >> "$GITHUB_ENV"
          echo "Env file assembled. Line count: $(wc -l < "$ENVFILE")"

      - name: SCP env file to deploy user's home staging area
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p ~/.bootstrap && chmod 700 ~/.bootstrap"
          scp -i ~/.ssh/deploy_key "$ENVFILE" "${DEPLOY_USER}@${DEPLOY_HOST}:~/.bootstrap/workbench.env"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "chmod 600 ~/.bootstrap/workbench.env && stat -c '%a %U:%G %s bytes' ~/.bootstrap/workbench.env"
          echo ""
          echo "✓ Env staged at deploy@VM:~/.bootstrap/workbench.env (chmod 600)."
          echo ""
          echo "NEXT STEP (run by admin with full sudo, e.g. tripplezhou):"
          echo "  sudo install -m 640 -o root -g deploy /home/deploy/.bootstrap/workbench.env /etc/workbench/workbench.env"
          echo "  sudo rm /home/deploy/.bootstrap/workbench.env"
          echo "  sudo systemctl restart workbench-backend.service workbench-frontend.service  # if services were running"
