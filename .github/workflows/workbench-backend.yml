name: Workbench Backend CI

# Forward-compat: GitHub Actions deprecates Node 20 on 2026-09-16.
# Set runtime to Node 24 so JS-based actions (checkout/setup-python/cache/...)
# run on Node 24 immediately and don't switch under us in September.
# Source: framework v0.9.23 #2 + GHA changelog 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# paths-trigger 配置审计（v0.9.27 §12.7.1 — B028 微沉淀）：
# 业务代码不只在 workbench/backend/**；trade/** 含 strategy / portfolio / data
# loader 共享代码；scripts/** 含 B028+ backfill / validate_snapshot；
# pyproject.toml 含 runtime deps (v0.9.29 §12.8 守门规则同源）。这些路径若
# 不在 paths-trigger 内，对应 commit 不触 CI，workflow_run-triggered
# Workbench Deploy 不 arm，production drift（B028 F004 fix-round 1 实证）。
on:
  push:
    branches: [main]
    paths:
      - "workbench/backend/**"
      - "trade/**"            # B028+ shared business logic (loader, strategy, portfolio)
      - "scripts/**"          # B028+ backfill scripts, validate_snapshot, universe config
      - "pyproject.toml"      # runtime deps (v0.9.29 §12.8)
      - ".github/workflows/workbench-backend.yml"
  pull_request:
    paths:
      - "workbench/backend/**"
      - "trade/**"
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/workbench-backend.yml"

concurrency:
  group: workbench-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workbench-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workbench/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: workbench/backend/pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend with dev tooling
        run: python -m pip install -e ".[dev]"

      - name: Install trade package (B044 — recommendations precompute imports it)
        # The recommendations precompute job (B044 F002) imports
        # trade.backtest.master_portfolio for real scoring; install the
        # repo-root trade/ package into the CI venv so those tests resolve and
        # so the install itself (pandas/numpy deps) is validated in CI. The
        # request path must NEVER import trade — enforced by the §12.10 AST
        # guard (F003), not by physical absence, now that trade ships to the venv.
        run: python -m pip install ../..

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy (strict — workbench_api + tests, per pyproject)
        run: python -m mypy

      - name: Pytest — unit
        run: python -m pytest tests/unit -q

      - name: Pytest — safety boundary guards
        run: python -m pytest tests/safety -q
