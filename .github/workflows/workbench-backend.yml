name: Workbench Backend CI

on:
  push:
    branches: [main]
    paths:
      - "workbench/backend/**"
      - ".github/workflows/workbench-backend.yml"
  pull_request:
    paths:
      - "workbench/backend/**"
      - ".github/workflows/workbench-backend.yml"

concurrency:
  group: workbench-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workbench-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workbench/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: workbench/backend/pyproject.toml

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend with dev tooling
        run: python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy (strict)
        run: python -m mypy workbench_api

      - name: Pytest — unit
        run: python -m pytest tests/unit -q

      - name: Pytest — safety boundary guards
        run: python -m pytest tests/safety -q
