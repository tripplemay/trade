name: Python CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev tooling
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest

      - name: Run ruff
        run: python -m ruff check .

      - name: Compile package
        run: python -m compileall trade

      - name: Run mypy
        run: python -m mypy --install-types --non-interactive trade
