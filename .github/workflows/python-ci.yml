name: Python CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "workbench/**"
      - ".github/workflows/workbench-*.yml"
      - "docs/**"
      - ".auto-memory/**"
      - "progress.json"
      - "features.json"
      - "backlog.json"
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
  pull_request:
    paths-ignore:
      - "workbench/**"
      - ".github/workflows/workbench-*.yml"
      - "docs/**"
      - ".auto-memory/**"
      - "progress.json"
      - "features.json"
      - "backlog.json"
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev tooling
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run pytest
        # Acceptance invariants run as their own explicit step below (B071 F004)
        # so a red acceptance gate is visibly labelled — not folded into the
        # implicit testpaths run.
        run: python -m pytest --ignore=tests/acceptance

      - name: Run acceptance invariants (B071 F004 — golden permanent regressions)
        run: python -m pytest tests/acceptance -q

      - name: Run ruff
        run: python -m ruff check .

      - name: Compile package
        run: python -m compileall trade

      - name: Run mypy
        run: python -m mypy --install-types --non-interactive trade
