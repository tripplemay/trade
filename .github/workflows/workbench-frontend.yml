name: Workbench Frontend CI

# Forward-compat: GitHub Actions deprecates Node 20 on 2026-09-16.
# Set runtime to Node 24 so JS-based actions (checkout/setup-node/cache/...)
# run on Node 24 immediately and don't switch under us in September.
# Source: framework v0.9.23 #2 + GHA changelog 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - "workbench/frontend/**"
      - "workbench/backend/**"
      - ".github/workflows/workbench-frontend.yml"
  pull_request:
    paths:
      - "workbench/frontend/**"
      - "workbench/backend/**"
      - ".github/workflows/workbench-frontend.yml"

concurrency:
  group: workbench-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workbench-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workbench/frontend
    env:
      CI: "true"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workbench/frontend/package-lock.json

      - name: Set up Python (for OpenAPI drift check)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: workbench/backend/pyproject.toml

      - name: Install backend (for uvicorn used by generate-types.sh)
        working-directory: workbench/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          # B072 F001 — the golden→DB seed (recommendations precompute) and the
          # backtest worker daemon import the repo-root ``trade`` package for the
          # real Master Portfolio scoring; install it like the backend CI does
          # (working-directory is workbench/backend → `../..` is the repo root).
          python -m pip install ../..

      - name: Install npm dependencies
        run: npm ci

      - name: OpenAPI → TypeScript drift check
        env:
          PYTHON_BIN: ${{ env.pythonLocation }}/bin/python
        run: |
          bash scripts/generate-types.sh
          git diff --exit-code src/types/api.ts

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Cache Playwright browsers (chromium only)
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium (browser binary + OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vitest unit
        run: npm test

      - name: Start FastAPI backend (for dev rewrites + API monitor)
        env:
          # B022 F014 fix: Playwright's dev-rewrite proxy targets the
          # FastAPI backend on 127.0.0.1:8723. Without the backend
          # running, every `/api/*` rewrite returns ECONNREFUSED / 500
          # and the new protected-routes diagnostic listener (catches
          # unexpected 4xx/5xx) fails — which is exactly what the
          # F014 acceptance asks for. Boot uvicorn before Playwright so
          # the proxied requests round-trip with the same NEXTAUTH_SECRET
          # the auth-setup project mints against.
          NEXTAUTH_SECRET: ci-playwright-secret-do-not-use-in-prod
          ALLOWED_USER_EMAIL: ci-playwright@example.com
          # B022 F014 fixing-round 1: F006 dashboard / F010 recommendations
          # / F011 snapshots / F012 backlog all hit the SQLite schema.
          # Pin the DB to a known path under workbench/backend/ + apply
          # Alembic migrations before launching uvicorn so the routes
          # surface 200 (with empty data) instead of 500 (table missing).
          WORKBENCH_DB_URL: sqlite:///./e2e-workbench.db
        working-directory: workbench/backend
        run: |
          set -euxo pipefail
          rm -f e2e-workbench.db
          ${{ env.pythonLocation }}/bin/python -m alembic upgrade head
          # B072 F001 — golden→DB full-stack seed. Pushes the committed golden
          # fixture into the DB so the e2e trading loop (F002) runs on real-shaped
          # data: price_snapshot (marks) + recommendation_snapshot (real Master
          # target scored on golden) + account_snapshot (closed-loop account) +
          # investment_report (b040 metrics-card slug, via seed_e2e_reports.seed).
          # Deterministic: same golden → same DB content.
          ${{ env.pythonLocation }}/bin/python scripts/seed_golden_e2e.py
          ${{ env.pythonLocation }}/bin/python -m uvicorn workbench_api.app:app \
            --host 127.0.0.1 --port 8723 --log-level warning \
            > /tmp/uvicorn-e2e.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8723/api/health > /dev/null 2>&1; then
              echo "backend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::FastAPI backend did not start after 30s" >&2
          cat /tmp/uvicorn-e2e.log >&2
          exit 1

      - name: Start backtest worker daemon (B072 F001 — full-stack orchestration)
        env:
          # Same DB as the uvicorn step — the worker drains the backtest_run /
          # target_refresh_job queues against the seeded e2e DB. WORKBENCH_DB_URL
          # is a non-default value so require_production_db lets the worker run
          # (no WORKBENCH_ALLOW_DEV_DB needed). Tight poll for low-latency drain.
          WORKBENCH_DB_URL: sqlite:///./e2e-workbench.db
          WORKBENCH_BACKTEST_POLL_SECONDS: "1.0"
        working-directory: workbench/backend
        run: |
          set -euxo pipefail
          # Background the worker alongside uvicorn; it survives into the
          # Playwright step (same as the backgrounded uvicorn). No WORKBENCH_DATA_ROOT
          # is set, so any enqueued real backtest resolves to a graceful "error"
          # rather than crashing the loop — the closed-loop e2e does not enqueue one.
          ${{ env.pythonLocation }}/bin/python -m workbench_api.backtests.worker \
            > /tmp/worker-e2e.log 2>&1 &
          worker_pid=$!
          sleep 3
          if ! kill -0 "${worker_pid}" 2>/dev/null; then
            echo "::error::backtest worker daemon exited within 3s" >&2
            cat /tmp/worker-e2e.log >&2
            exit 1
          fi
          echo "backtest worker daemon alive (pid=${worker_pid})"

      - name: Playwright E2E smoke (boots dev server via start-server-and-test)
        env:
          # B022 F003 — Playwright's `setup` project mints an HS256 JWS
          # session cookie against this secret + email pair (see
          # tests/e2e/auth-setup.ts). The dev server must boot with the
          # same values so middleware/auth-config decode the cookie and
          # let the authed project visit /(protected)/* routes. These
          # are test-only fixtures; production uses the systemd-injected
          # workbench.env values on the VM.
          NEXTAUTH_SECRET: ci-playwright-secret-do-not-use-in-prod
          ALLOWED_USER_EMAIL: ci-playwright@example.com
        run: npx start-server-and-test "npm run dev -- --port 3000" http://127.0.0.1:3000 "npx playwright test --reporter=list"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            workbench/frontend/playwright-report/
            workbench/frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
