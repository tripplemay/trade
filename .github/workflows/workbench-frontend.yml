name: Workbench Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "workbench/frontend/**"
      - ".github/workflows/workbench-frontend.yml"
  pull_request:
    paths:
      - "workbench/frontend/**"
      - ".github/workflows/workbench-frontend.yml"

concurrency:
  group: workbench-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workbench-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workbench/frontend
    env:
      CI: "true"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workbench/frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Cache Playwright browsers (chromium only)
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium (browser binary + OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vitest unit
        run: npm test

      - name: Playwright E2E smoke (boots dev server via start-server-and-test)
        run: npx start-server-and-test "npm run dev -- --port 3000" http://127.0.0.1:3000 "npx playwright test --reporter=list"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            workbench/frontend/playwright-report/
            workbench/frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
