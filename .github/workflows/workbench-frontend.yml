name: Workbench Frontend CI

# Forward-compat: GitHub Actions deprecates Node 20 on 2026-09-16.
# Set runtime to Node 24 so JS-based actions (checkout/setup-node/cache/...)
# run on Node 24 immediately and don't switch under us in September.
# Source: framework v0.9.23 #2 + GHA changelog 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
    paths:
      - "workbench/frontend/**"
      - "workbench/backend/**"
      - ".github/workflows/workbench-frontend.yml"
  pull_request:
    paths:
      - "workbench/frontend/**"
      - "workbench/backend/**"
      - ".github/workflows/workbench-frontend.yml"

concurrency:
  group: workbench-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workbench-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workbench/frontend
    env:
      CI: "true"
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: workbench/frontend/package-lock.json

      - name: Set up Python (for OpenAPI drift check)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: workbench/backend/pyproject.toml

      - name: Install backend (for uvicorn used by generate-types.sh)
        working-directory: workbench/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install npm dependencies
        run: npm ci

      - name: OpenAPI → TypeScript drift check
        env:
          PYTHON_BIN: ${{ env.pythonLocation }}/bin/python
        run: |
          bash scripts/generate-types.sh
          git diff --exit-code src/types/api.ts

      - name: Resolve Playwright version
        id: playwright-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Cache Playwright browsers (chromium only)
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-chromium-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium (browser binary + OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: ESLint
        run: npm run lint

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vitest unit
        run: npm test

      - name: Playwright E2E smoke (boots dev server via start-server-and-test)
        env:
          # B022 F003 — Playwright's `setup` project mints an HS256 JWS
          # session cookie against this secret + email pair (see
          # tests/e2e/auth-setup.ts). The dev server must boot with the
          # same values so middleware/auth-config decode the cookie and
          # let the authed project visit /(protected)/* routes. These
          # are test-only fixtures; production uses the systemd-injected
          # workbench.env values on the VM.
          NEXTAUTH_SECRET: ci-playwright-secret-do-not-use-in-prod
          ALLOWED_USER_EMAIL: ci-playwright@example.com
        run: npx start-server-and-test "npm run dev -- --port 3000" http://127.0.0.1:3000 "npx playwright test --reporter=list"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            workbench/frontend/playwright-report/
            workbench/frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
