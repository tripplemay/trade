      numeric figure at all, ungrounded_number is false.\\n\\nGROUNDING_INPUTS (JSON):\\n{\\\"figures\\\":
      {\\\"SPY_weight_pct\\\": 40, \\\"momentum_exposure_pct\\\": 12}, \\\"note\\\":
