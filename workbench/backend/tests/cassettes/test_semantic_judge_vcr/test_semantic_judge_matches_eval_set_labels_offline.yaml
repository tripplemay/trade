      properties for a human/CI reviewer.\\n\\nThe advisor is required to write in
      Simplified Chinese (zh-CN). The following Latin/ASCII tokens are LEGITIMATE
      and must NEVER be flagged as residual: stock tickers (SPY, AAPL, QQQ, TLT...),
