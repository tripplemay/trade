      whole English sentence, or an English adjective/verb doing the work a Chinese
      word should do, is a residual. Isolated legitimate tokens are NOT.\\n\\nCHECK
      2 \u2014 UNGROUNDED NUMBER: You are given GROUNDING_INPUTS (the quant / data
      facts available to the advisor). Does the output cite any numeric figure (a
      percentage, ratio, price, weight, bps, return) that does NOT trace to a value
      present in GROUNDING_INPUTS? A number that matches an input value (exactly,
      or as an obvious restatement) is GROUNDED. A fabricated figure that appears
      nowhere in the inputs is UNGROUNDED. Numbers that are self-evidently non-financial
