[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "workbench_api"
version = "0.1.0"
description = "Workbench backend API (B020 dev infrastructure skeleton)."
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115,<0.116",
  "pydantic>=2.7,<3",
  "pydantic-settings>=2.3,<3",
  "uvicorn[standard]>=0.30,<0.31",
]

[project.optional-dependencies]
dev = [
  "httpx>=0.27",
  "mypy>=1.10",
  "pytest>=8.2",
  "ruff>=0.5",
]

[tool.hatch.build.targets.wheel]
packages = ["workbench_api"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.11"
files = ["workbench_api"]
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
