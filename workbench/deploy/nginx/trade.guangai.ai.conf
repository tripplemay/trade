# nginx vhost for the workbench.
#
# Drop this file into /etc/nginx/sites-available/trade.guangai.ai.conf and
# symlink it from sites-enabled/. The TLS certificate paths below are filled
# by certbot's `--nginx` plugin on first run (see workbench/deploy/CERTBOT-SETUP.md).
#
# Co-existence with kolquest.com + staging.kolmatrix:
#   - This server block listens only for `trade.guangai.ai`; no `default_server`
#     directive, so it does not steal traffic from neighbours.
#   - Upstreams are loopback-only on 8723 (backend) + 3000 (frontend); the
#     systemd units in workbench/deploy/systemd bind there.
#
# Validate with `sudo nginx -t` before `sudo systemctl reload nginx`.

server {
    listen 80;
    listen [::]:80;
    server_name trade.guangai.ai;

    # Let certbot's HTTP-01 challenge land here during issuance / renewal;
    # everything else hard-redirects to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trade.guangai.ai;

    # certbot fills these in on first run; until then this file fails
    # `nginx -t`, so do not symlink into sites-enabled before issuing the cert.
    ssl_certificate     /etc/letsencrypt/live/trade.guangai.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trade.guangai.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Sensible operational defaults. Lifted to match the kolquest.com vhost
    # so co-hosted services behave consistently.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;
    client_max_body_size 10m;

    # Logs are per-vhost so kolquest/aigcgateway logs do not get crowded.
    access_log /var/log/nginx/trade.guangai.ai.access.log;
    error_log  /var/log/nginx/trade.guangai.ai.error.log;

    # Backend API surface. Auth.js callback URLs all live under /api/auth.
    location /api/ {
        proxy_pass http://127.0.0.1:8723;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Frontend (Next.js standalone server). Auth.js needs the original Host
    # to mint correct redirect URIs; do not strip $host here.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
