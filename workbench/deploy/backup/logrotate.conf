/var/log/workbench/backup.log {
    monthly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 0644 deploy deploy
    copytruncate
}

/var/log/workbench/app.log /var/log/workbench/access.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0644 deploy deploy
    copytruncate
}
